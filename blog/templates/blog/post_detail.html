{% extends 'blog/base.html' %}
{% block title %}VW Blog{% endblock %}

{% block body %}
{% load staticfiles %}
    <div class="post">
        {% if post.published_date %}
            <div class="date">
                {{ post.published_date }}
            </div>
        {% endif %}
        <h1>{{ post.title }}</h1>
        <p>{{ post.text }}</p>
        {% if user.is_active %}
        <a href="{% url 'blog:post_edit' pk=post.pk  %}" class="btn btn-info" role="button">Edit Post</a>
        {% endif %}
    </div>
{% endblock %}
