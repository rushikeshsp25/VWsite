{% extends 'blog/base.html' %}
{% block title %}VW Blog{% endblock %}

{% block body %}
{% load staticfiles %}
<div class="content container">
    <div class="row">
        <div class="col-md-8">
            {% for post in posts %}
                <div class="post">
                    <div class="date">
                        <p>published: {{ post.published_date }}</p>
                    </div>
                    <h1><a href="{% url 'blog:post_detail' pk=post.pk %}">{{ post.title }}</a></h1>
                    <p>{{ post.text|linebreaksbr }}</p>
                </div>
            {% endfor %}
        </div>
        {% if user.is_active %}
        <div class="col-md-4" align="center">
          <a href="{% url 'blog:post_new' %}" class="btn btn-info" role="button">New Post</a>
        </div>
        {% endif %}
    </div>
</div>

{% endblock %}
